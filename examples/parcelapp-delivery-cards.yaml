views:
  - title: Parcel Deliveries
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:auto-entities
            card:
              type: grid
              title: Active Deliveries
              square: false
              columns: 1
            card_param: cards
            sort:
              method: attribute
              attribute: timestamp_expected
              numeric: true
            filter:
              include:
                - options:
                    type: custom:parcelapp-delivery-card
                    entity: this.entity_id
                    layout: hero
                    events_limit: 4
                    show_expected: true
                    show_carrier: true
                    show_progress_rail: true
                    show_route: true
                    show_decorations: true
                    action: more-info
                  domain: sensor
                  attributes:
                    parcelapp_delivery: true
                  sort:
                    method: attribute
                    attribute: date_expected
              exclude:
                - options: {}
                  state: unavailable
            grid_options:
              columns: full
        column_span: 3
    badges:
      - type: entity
        entity: sensor.parcelapp_deliveries
      - type: entity
        entity: sensor.parcelapp_exceptions
      - type: entity
        entity: sensor.parcelapp_out_for_delivery
